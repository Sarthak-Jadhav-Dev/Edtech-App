name: kte
description: "Flutter Course Projects"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.4
  cloud_firestore: ^5.6.2
  shared_preferences: ^2.5.4
  lottie: ^3.3.2
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.2
  firebase_storage: ^12.4.10
  file_picker: ^11.0.1
  youtube_player_flutter: ^9.1.1
  google_generative_ai: ^0.4.7
  flutter_animate: ^4.5.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#F3E8FF"
  image: "assets/images/edtech.png"
  android: true
  ios: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/edtech.png"

flutter:
  uses-material-design: true
  fonts:
    - family: Sans
      fonts:
        - asset: assets/fonts/GoogleSans-SemiBold.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-ExtraBold.ttf

  assets:
    - assets/images/
    - assets/lottie/
